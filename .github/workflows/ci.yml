name: CI

on:
  # Omitting push: main — the merge queue already validates the integrated
  # state before landing; a second run after merge duplicates work without
  # adding signal.
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - '**/graphite-base/**'
  schedule:
    # Weekly full suite — catches new CVEs and regressions between PRs.
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  shellcheck:
    # Skip the redundant re-run triggered when the merge queue (graphite-app[bot])
    # force-pushes the original branch after rebasing it for the draft gtmq_ PR.
    # The merge queue already runs CI on the gtmq_ draft PR; firing again here
    # adds no signal and caused "CI re-ran after merge" noise on PR pages.
    if: "github.event_name != 'pull_request' || github.event.action != 'synchronize' || github.actor != 'graphite-app[bot]'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint shell scripts
        run: find scripts/ -type f ! -name "*.*" | xargs shellcheck

  ci:
    if: "github.event_name != 'pull_request' || github.event.action != 'synchronize' || github.actor != 'graphite-app[bot]'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check + lint + format
        run: pnpm run check

      - name: Test
        run: pnpm test

  secret-scan:
    name: Secret Scan
    if: "github.event_name != 'pull_request' || github.event.action != 'synchronize' || github.actor != 'graphite-app[bot]'"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install gitleaks
      run: |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
        FALLBACK_VERSION=8.30.0
        VERSION=$(curl -sf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        VERSION=${VERSION:-$FALLBACK_VERSION}
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_${ARCH}.tar.gz" \
          | tar -xz gitleaks
        sudo mv gitleaks /usr/local/bin/

    - name: Scan for leaked secrets
      run: |
        BASE="${{ github.event.pull_request.base.sha }}"
        HEAD="${{ github.event.pull_request.head.sha }}"
        if [ -n "$BASE" ] && [ -n "$HEAD" ]; then
          gitleaks detect --source . --log-opts "${BASE}..${HEAD}"
        else
          gitleaks detect --source .
        fi
