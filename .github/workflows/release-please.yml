on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.5). Must match package.json on main. Leave empty to dry-run without publishing.'
        required: false
        type: string

name: Release & Publish

jobs:
  release-please:
    # Skip release-please entirely on manual dispatch — it is only needed for
    # automated releases triggered by push.  When manually dispatched, the
    # publish-npm job reads the version straight from package.json.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      # pr is set whenever release-please opens or updates a release PR (but has
      # not yet merged it). Exposing it lets downstream steps distinguish between
      # "release created this run" and "release PR is pending".
      pr: ${{ steps.release.outputs.pr }}
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

      - name: Assert release-please acted on releasable commits
        # Fail loudly when a fix:/feat: commit lands but release-please neither
        # created/updated a release PR nor published a release tag. This catches
        # the "silent skip" that occurs when the commit message cannot be parsed
        # (e.g. the PR body was included in the squash commit).
        if: github.event_name == 'push'
        shell: bash
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          commit_title=$(git log -1 --format='%s' "$COMMIT_SHA")
          if echo "$commit_title" | grep -qE '^(feat|fix)(\([^)]*\))?!?:' && \
             [[ "$RELEASE_CREATED" != "true" ]] && \
             [[ -z "$RELEASE_PR" ]]; then
            echo "ERROR: Commit '$commit_title' looks releasable but release-please neither created a release nor opened/updated a release PR." >&2
            echo "This usually means the commit message could not be parsed. Check that squash_merge_commit_message=BLANK is set on the repository." >&2
            exit 1
          fi

  # GITHUB_TOKEN pushes from release-please do not trigger pull_request workflows, and
  # workflow_dispatch does not attach the required `ci` check to the release PR. Run the
  # same validation here and publish a Check Run named `ci` on the release PR head commit.
  ci:
    needs: release-please
    if: >-
      always() &&
      github.event_name == 'push' &&
      needs.release-please.result == 'success' &&
      needs.release-please.outputs.pr != '' &&
      needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: read
    steps:
      - name: Resolve release PR head
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          set -euo pipefail
          pr_number=$(jq -r '.number' <<<"$RELEASE_PR_JSON")
          head_sha=$(gh pr view "$pr_number" \
            --repo "${{ github.repository }}" \
            --json headRefOid \
            -q .headRefOid)
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

      - name: Start ci check
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          check_id=$(gh api "repos/${{ github.repository }}/check-runs" \
            --method POST \
            -f name=ci \
            -f head_sha="${{ steps.pr.outputs.head_sha }}" \
            -f status=in_progress \
            -f started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --jq .id)
          echo "id=${check_id}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      # Corepack from packageManager + pnpm store cache (repository-helpers#362).
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - uses: the-hcma/repository-helpers/actions/setup-pnpm-corepack@cde3063aa1e030fcac59bbf215131a3bd25d7908

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      - name: Type check + lint + format
        id: check_project
        run: pnpm run check

      - name: Test
        id: test
        run: pnpm test

      - name: Complete ci check
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusion=success
          if [[ "${{ steps.install.outcome }}" != "success" ]] \
            || [[ "${{ steps.check_project.outcome }}" != "success" ]] \
            || [[ "${{ steps.test.outcome }}" != "success" ]]; then
            conclusion=failure
          fi
          gh api "repos/${{ github.repository }}/check-runs/${{ steps.check.outputs.id }}" \
            --method PATCH \
            -f status=completed \
            -f conclusion="$conclusion" \
            -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  publish-npm:
    # On push: run only when release-please created a release tag.
    # On workflow_dispatch: run directly (release-please job is skipped).
    needs: [release-please]
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.version != '')
      )
    runs-on: ubuntu-latest
    # Must match the environment name on npm trusted publisher settings (if configured).
    # Required reviewers were removed from this environment so publish is not gated.
    environment: npm-production
    permissions:
      contents: read
      id-token: write # required for NPM provenance
    outputs:
      published_version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Verify version matches package.json (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          input_version="${{ inputs.version }}"
          if [[ "$pkg_version" != "$input_version" ]]; then
            echo "ERROR: Input version '$input_version' does not match package.json version '$pkg_version'." >&2
            echo "Update package.json on main to '$input_version' before dispatching, or correct the version input." >&2
            exit 1
          fi
          echo "Version confirmed: $pkg_version"

      # Corepack from packageManager + pnpm store cache (repository-helpers#362).
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: the-hcma/repository-helpers/actions/setup-pnpm-corepack@cde3063aa1e030fcac59bbf215131a3bd25d7908
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Validate & Build Project
        run: pnpm run check && pnpm run test && pnpm run build

      - name: Get package version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
        
      # Trusted publishing (OIDC): do not set NODE_AUTH_TOKEN unless NPM_TOKEN exists;
      # an empty token prevents OIDC and breaks publish.
      - name: Publish to npm
        run: pnpm publish --ignore-scripts --no-git-checks --access public --provenance

  smoke-test:
    name: Post-publish smoke test (npx)
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Wait for package to be available on registry
        # npm can take a few seconds to make a newly-published version resolvable.
        # We poll with a short sleep between attempts rather than a fixed delay.
        shell: bash
        run: |
          version="${{ needs.publish-npm.outputs.published_version }}"
          echo "Waiting for @the-hcma/fpdf@${version} on npm..."
          for i in $(seq 1 12); do
            if npm view "@the-hcma/fpdf@${version}" version &>/dev/null; then
              echo "Package available."
              exit 0
            fi
            echo "Attempt $i: not yet available, retrying in 10s..."
            sleep 10
          done
          echo "Package did not become available in time." >&2
          exit 1

      - name: npx --help smoke test
        shell: bash
        run: |
          output=$(npx --yes @the-hcma/fpdf --help 2>&1)
          echo "$output"
          if [[ -z "$output" ]]; then
            echo "ERROR: --help produced no output" >&2
            exit 1
          fi
          if ! echo "$output" | grep -q "Usage:"; then
            echo "ERROR: --help output does not contain 'Usage:'" >&2
            exit 1
          fi

      - name: npx --version smoke test
        shell: bash
        run: |
          version="${{ needs.publish-npm.outputs.published_version }}"
          output=$(npx --yes @the-hcma/fpdf@"${version}" --version 2>&1)
          echo "$output"
          # Require output to be exactly "<version>" or "<version> (<hash>)" — nothing else.
          if ! echo "$output" | grep -qE "^${version}( \([0-9a-f]+\))?$"; then
            echo "ERROR: --version output '${output}' does not match expected pattern '${version} [(<hash>)]'" >&2
            exit 1
          fi
