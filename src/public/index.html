<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fpdf</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="dark">
    <div id="toolbar">
      <div class="toolbar-group">
        <button
          id="open-picker"
          type="button"
          title="Open a different PDF"
          aria-label="Open a different PDF"
        >
          &#128193;
        </button>
      </div>
      <div class="toolbar-group toolbar-group--status">
        <span id="status">Loading…</span>
        <button
          id="copy-path"
          type="button"
          title="Copy full path to clipboard"
          aria-label="Copy full path to clipboard"
        >
          ⧉
        </button>
      </div>
      <div class="toolbar-group">
        <button id="save" type="button" disabled title="Save field values to disk">Save</button>
      </div>
      <div class="toolbar-group">
        <button id="zoom-out" type="button" title="Zoom out (Ctrl+scroll)">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" type="button" title="Zoom in (Ctrl+scroll)">+</button>
      </div>
      <div class="toolbar-group">
        <button id="toggle-fields" type="button" title="Highlight fillable fields">
          Show fields
        </button>
        <button
          id="clear-fields"
          type="button"
          title="Clear all field values"
          aria-label="Clear all field values"
        >
          ✕
        </button>
      </div>
      <div class="toolbar-group">
        <button id="export-pdf" type="button" title="Export a printable PDF">Export PDF</button>
        <button
          id="save-acroform"
          type="button"
          hidden
          title="Save an editable AcroForm PDF alongside the source file"
        >
          Save AcroForm
        </button>
      </div>
      <div class="toolbar-group">
        <button
          id="dark-toggle"
          type="button"
          title="Toggle light/dark mode"
          aria-label="Toggle light/dark mode"
        >
          ☀
        </button>
      </div>
      <div class="toolbar-group toolbar-group--version">
        <span id="app-version" title=""></span>
      </div>
    </div>
    <div id="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" type="button" aria-label="Dismiss error" title="Dismiss error">
        ✕
      </button>
    </div>
    <div id="warn-banner" hidden>
      <span id="warn-message"></span>
      <button
        id="regen-btn"
        type="button"
        hidden
        title="Re-export this PDF as a standard AcroForm PDF"
      >
        Regenerate as standard PDF
      </button>
      <button id="warn-dismiss" type="button" aria-label="Dismiss warning" title="Dismiss warning">
        ✕
      </button>
    </div>
    <div id="pages"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
