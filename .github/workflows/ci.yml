name: CI

on:
  # Omitting push: main — the merge queue already validates the integrated
  # state before landing; a second run after merge duplicates work without
  # adding signal.
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    # Weekly full suite — catches new CVEs and regressions between PRs.
    - cron: '0 7 * * 4'
  workflow_dispatch:


concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip merge-queue branches — the merge queue validates the integrated
          # state itself; CI there duplicates work without adding signal.
          if [[ "${{ github.head_ref }}" == gtmq_merge_* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would otherwise
          # trigger a redundant CI run on an already-validated diff.
          pr_number="${{ github.event.pull_request.number }}"
          if [[ -n "$pr_number" ]]; then
            state=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json state -q .state)
            if [[ "$state" == "MERGED" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  changed-files:
    needs: guard
    if: needs.guard.outputs.skip != 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      npm_deps_changed: ${{ steps.diff.outputs.npm_deps_changed }}
    steps:
      - id: diff
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number }}"
          if [[ -z "$pr_number" ]]; then
            echo "npm_deps_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh pr view "$pr_number" \
            --repo "${{ github.repository }}" \
            --json files \
            -q '.files[].path' \
            | grep -qE '^(package\.json|pnpm-lock\.yaml)$'; then
            echo "npm_deps_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_deps_changed=false" >> "$GITHUB_OUTPUT"
          fi

  shellcheck:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Lint shell scripts
        run: find scripts/ -type f ! -name "*.*" | xargs shellcheck

  ci:
    needs: [guard, changed-files]
    if: >-
      needs.guard.outputs.skip != 'true' &&
      (
        github.event_name != 'pull_request' ||
        (
          needs.changed-files.result == 'success' &&
          needs.changed-files.outputs.npm_deps_changed == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: latest

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check + lint + format
        run: pnpm run check

      - name: Test
        run: pnpm test

  secret-scan:
    name: Secret Scan
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Secret Scan
        env:
          GITLEAKS_BASE: ${{ github.event.pull_request.base.sha || '' }}
          GITLEAKS_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash .github/ci/secret-scan
