name: CI

on:
  # Omitting push: main — the merge queue already validates the integrated
  # state before landing; a second run after merge duplicates work without
  # adding signal.
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]

  push:
    branches-ignore:
      - main
      - '**/graphite-base/**'
  schedule:
    # Weekly full suite — catches new CVEs and regressions between PRs.
    - cron: '0 7 * * 4'
  workflow_dispatch:


# Cancel in-progress reruns for the same trigger only. push and pull_request must
# not share a group: cancel-in-progress would leave CANCELLED required checks on
# the PR commit and block merge even when pull_request CI passed. pull_request
# actions are also split (opened/synchronize vs edited) so review-bot description
# patches do not cancel an in-flight test run for the same commit.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}-${{ github.event.action || github.event_name }}
  cancel-in-progress: true
jobs:
  guard:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip merge-queue branches — the merge queue validates the integrated
          # state itself; CI there duplicates work without adding signal.
          if [[ "${{ github.head_ref }}" == gtmq_merge_* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would otherwise
          # trigger a redundant CI run on an already-validated diff.
          pr_number="${{ github.event.pull_request.number }}"
          if [[ -n "$pr_number" ]]; then
            state=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json state -q .state)
            if [[ "$state" == "MERGED" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi


          # CodeRabbit appends review summaries to the PR description (pull_request
          # edited). We want its review comments only, not a second full CI run.
          if [[ "${{ github.event_name }}" == "pull_request" ]] \
              && [[ "${{ github.event.action }}" == "edited" ]] \
              && [[ "${{ github.event.sender.login }}" == "coderabbitai[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Pull request CI skipped: CodeRabbit description edit (review metadata only)"
            exit 0
          fi
          # Skip push CI when an open PR already covers this branch.
          # GitHub always delivers pull_request synchronize for PR-head pushes;
          # the push trigger is only for restacks without an open PR.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR_COUNT=0
            if count="$(gh pr list --repo "$GITHUB_REPOSITORY" \
                --head "$BRANCH" --state open \
                --json number --jq 'length' 2>/dev/null)"; then
              PR_COUNT="$count"
            fi
            if [[ "$PR_COUNT" -gt 0 ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Push CI skipped: open PR exists; pull_request handles this push"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
  changed-files:
    needs: guard
    if: needs.guard.outputs.skip != 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      npm_deps_changed: ${{ steps.diff.outputs.npm_deps_changed }}
    steps:
      - id: diff
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number }}"
          if [[ -z "$pr_number" ]]; then
            echo "npm_deps_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh pr view "$pr_number" \
            --repo "${{ github.repository }}" \
            --json files \
            -q '.files[].path' \
            | grep -qE '^(package\.json|pnpm-lock\.yaml|\.github/workflows/.*\.yml)$'; then
            echo "npm_deps_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_deps_changed=false" >> "$GITHUB_OUTPUT"
          fi

  shellcheck:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Lint shell scripts
        run: find scripts/ -type f ! -name "*.*" | xargs shellcheck

  ci:
    needs: [guard, changed-files]
    if: >-
      needs.guard.outputs.skip != 'true' &&
      (
        github.event_name != 'pull_request' ||
        (
          needs.changed-files.result == 'success' &&
          needs.changed-files.outputs.npm_deps_changed == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: '24'

      # Corepack from packageManager + pnpm store cache (repository-helpers#362).
      # Do not use pnpm/action-setup or setup-node cache: 'pnpm'.
      - uses: the-hcma/repository-helpers/actions/setup-pnpm-corepack@cde3063aa1e030fcac59bbf215131a3bd25d7908

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check + lint + format
        run: pnpm run check

      - name: Test
        run: pnpm test

  secret-scan:
    name: Secret Scan
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Secret Scan
        env:
          GITLEAKS_BASE: ${{ github.event.pull_request.base.sha || '' }}
          GITLEAKS_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash .github/ci/secret-scan
