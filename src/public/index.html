<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fpdf</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="toolbar">
      <span id="status">Loading…</span>
      <button id="save" type="button" disabled>Save</button>
      <div id="zoom-controls">
        <button id="zoom-out" type="button" title="Zoom out (Ctrl+scroll)">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" type="button" title="Zoom in (Ctrl+scroll)">+</button>
      </div>
      <button id="toggle-fields" type="button">Show fields</button>
      <button id="export-pdf" type="button">Export PDF</button>
    </div>
    <div id="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" type="button" aria-label="Dismiss error">✕</button>
    </div>
    <div id="pages"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
