<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fpdf</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="dark">
    <div id="toolbar">
      <div class="toolbar-group toolbar-group--status">
        <span id="status">Loading…</span>
        <button
          id="copy-path"
          type="button"
          title="Copy full path to clipboard"
          aria-label="Copy full path to clipboard"
        >
          ⧉
        </button>
      </div>
      <div class="toolbar-group">
        <button id="save" type="button" disabled>Save</button>
      </div>
      <div class="toolbar-group">
        <button id="zoom-out" type="button" title="Zoom out (Ctrl+scroll)">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" type="button" title="Zoom in (Ctrl+scroll)">+</button>
      </div>
      <div class="toolbar-group">
        <button id="toggle-fields" type="button">Show fields</button>
        <button
          id="clear-fields"
          type="button"
          title="Clear all field values"
          aria-label="Clear all field values"
        >
          ✕
        </button>
      </div>
      <div class="toolbar-group">
        <button id="export-pdf" type="button" title="Export a printable PDF">Export PDF</button>
        <button
          id="save-acroform"
          type="button"
          hidden
          title="Save a finalized AcroForm PDF alongside the source file. AcroForm fields can be filled, signed, and searched in any standard PDF viewer — unlike plain scanned or vector PDFs."
        >
          Save AcroForm
        </button>
      </div>
      <div class="toolbar-group">
        <button
          id="dark-toggle"
          type="button"
          title="Toggle light/dark mode"
          aria-label="Toggle light/dark mode"
        >
          ☀
        </button>
      </div>
    </div>
    <div id="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" type="button" aria-label="Dismiss error">✕</button>
    </div>
    <div id="warn-banner" hidden>
      <span id="warn-message"></span>
      <button id="regen-btn" type="button" hidden>Regenerate as standard PDF</button>
      <button id="warn-dismiss" type="button" aria-label="Dismiss warning">✕</button>
    </div>
    <div id="pages"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
